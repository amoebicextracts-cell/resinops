name: Database Tests

on:
  pull_request:
    paths:
      - "supabase/**"
      - ".github/workflows/database-tests.yml"
  push:
    branches: [master]
    paths:
      - "supabase/**"
      - ".github/workflows/database-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  migration-and-rls:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Add disposable production-shaped baseline
        run: cp supabase/ci/production_schema.sql supabase/migrations/20260715000000_ci_production_schema.sql

      - name: Apply migrations to disposable database
        run: supabase db start

      - name: Run database policy tests
        run: supabase test db supabase/tests/facility_rls.sql supabase/tests/security_invariants.sql supabase/tests/scope_permissions.sql

